<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LATAM Pulse — Logic</title>
</head>
<body>
    <script>
        // ====================================================================
        // LATAM Pulse — headless execution environment
        // Called by AI Edge Gallery via window.ai_edge_gallery_get_result
        // Source: Google News RSS, routed through public CORS proxies.
        // ====================================================================

        const FETCH_TIMEOUT_MS = 10000;

        // Google News RSS does not emit CORS headers, so the fetch must go
        // through a public CORS proxy. The list is tried in order; the first
        // proxy that returns parseable RSS wins.
        const CORS_PROXIES = [
            target => `https://corsproxy.io/?url=${encodeURIComponent(target)}`,
            target => `https://api.allorigins.win/raw?url=${encodeURIComponent(target)}`,
            target => `https://api.codetabs.com/v1/proxy/?quest=${encodeURIComponent(target)}`
        ];

        const TOPIC_QUERIES = {
            business:   "negocios OR economía OR business",
            technology: "tecnología OR technology OR software OR AI",
            startups:   "startup OR founder OR fundraising OR ronda",
            fintech:    "fintech OR neobank OR pagos OR payments",
            general:    "LATAM OR Latinoamérica"
        };

        const COUNTRIES = {
            mx:  { name: "México",    gl: "MX", ceidLang: "es-419" },
            br:  { name: "Brasil",    gl: "BR", ceidLang: "pt-BR"  },
            ar:  { name: "Argentina", gl: "AR", ceidLang: "es-419" },
            co:  { name: "Colombia",  gl: "CO", ceidLang: "es-419" },
            cl:  { name: "Chile",     gl: "CL", ceidLang: "es-419" },
            pe:  { name: "Perú",      gl: "PE", ceidLang: "es-419" },
            all: { name: "LATAM",     gl: "US", ceidLang: "es-419" }
        };

        function buildQuery(topic, country) {
            const base = TOPIC_QUERIES[topic] || TOPIC_QUERIES.general;
            if (country === "all") {
                return `(${base}) (México OR Brasil OR Argentina OR Colombia OR Chile OR Perú OR LATAM)`;
            }
            return `(${base}) ${COUNTRIES[country].name}`;
        }

        function buildRssUrl(topic, country, language) {
            const countryInfo = COUNTRIES[country] || COUNTRIES.all;
            const hl = language === "en" ? "en-US" : countryInfo.ceidLang;
            const params = new URLSearchParams({
                q:    buildQuery(topic, country),
                hl,
                gl:   countryInfo.gl,
                ceid: `${countryInfo.gl}:${hl}`
            });
            return `https://news.google.com/rss/search?${params.toString()}`;
        }

        function stripHtml(html) {
            const tmp = document.createElement("div");
            tmp.innerHTML = html || "";
            return (tmp.textContent || tmp.innerText || "").trim();
        }

        function parseItemTitle(rawTitle) {
            // Google News appends " - Source" to titles.
            const idx = rawTitle.lastIndexOf(" - ");
            if (idx > 0 && idx > rawTitle.length - 60) {
                return {
                    title:  rawTitle.slice(0, idx).trim(),
                    source: rawTitle.slice(idx + 3).trim()
                };
            }
            return { title: rawTitle.trim(), source: "Google News" };
        }

        function parseRss(xmlText) {
            const doc = new DOMParser().parseFromString(xmlText, "application/xml");
            if (doc.querySelector("parsererror")) {
                throw new Error("Failed to parse RSS feed");
            }
            const items = Array.from(doc.querySelectorAll("item"));
            return items.map(item => {
                const rawTitle = item.querySelector("title")?.textContent || "";
                const { title, source: titleSource } = parseItemTitle(rawTitle);
                const sourceEl = item.querySelector("source");
                const source   = sourceEl?.textContent?.trim() || titleSource;
                const link     = item.querySelector("link")?.textContent?.trim() || "";
                const pubDate  = item.querySelector("pubDate")?.textContent?.trim() || "";
                const descRaw  = item.querySelector("description")?.textContent || "";
                return {
                    title,
                    source,
                    description: stripHtml(descRaw).slice(0, 180),
                    url: link,
                    publishedAt: pubDate ? new Date(pubDate).toISOString() : "",
                    image: null
                };
            });
        }

        async function fetchWithTimeout(url) {
            const controller = new AbortController();
            const timeoutId  = setTimeout(() => controller.abort(), FETCH_TIMEOUT_MS);
            try {
                const response = await fetch(url, { signal: controller.signal });
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                return await response.text();
            } finally {
                clearTimeout(timeoutId);
            }
        }

        // Try each proxy in order; first one that returns parseable RSS wins.
        async function fetchRssViaProxies(rssUrl) {
            const failures = [];
            for (const buildProxyUrl of CORS_PROXIES) {
                const proxyUrl = buildProxyUrl(rssUrl);
                const proxyHost = new URL(proxyUrl).host;
                try {
                    const xml = await fetchWithTimeout(proxyUrl);
                    if (!xml.includes("<item>") && !xml.includes("<item ")) {
                        throw new Error("no <item> in response");
                    }
                    return xml;
                } catch (e) {
                    failures.push(`${proxyHost}: ${e.message}`);
                }
            }
            throw new Error(`All proxies failed (${failures.join(" | ")})`);
        }

        async function fetchNews(topic, country, language) {
            const rssUrl = buildRssUrl(topic, country, language);
            const xmlText = await fetchRssViaProxies(rssUrl);
            return parseRss(xmlText)
                .filter(a => a.title && a.url)
                .slice(0, 6);
        }

        function buildWebviewURL(payload) {
            const encoded = encodeURIComponent(JSON.stringify(payload));
            return `webview.html?data=${encoded}`;
        }

        window['ai_edge_gallery_get_result'] = async (data) => {
            try {
                const params = JSON.parse(data);
                const topic    = params.topic    || "business";
                const country  = params.country  || "all";
                const language = params.language || "es";

                const articles = await fetchNews(topic, country, language);

                if (articles.length === 0) {
                    return JSON.stringify({
                        result: language === "es"
                            ? "No encontré noticias recientes para esa combinación. Prueba con otro tema o país."
                            : "No recent news found for that combination. Try another topic or country."
                    });
                }

                const countryName = (COUNTRIES[country] || COUNTRIES.all).name;
                const payload = {
                    topic,
                    country,
                    language,
                    countryName,
                    articles,
                    generatedAt: new Date().toISOString()
                };

                return JSON.stringify({
                    result: language === "es"
                        ? `Encontré ${articles.length} noticias de ${countryName}.`
                        : `Found ${articles.length} articles from ${countryName}.`,
                    webview: {
                        url: buildWebviewURL(payload),
                        aspectRatio: 0.65
                    }
                });
            } catch (e) {
                console.error(e);
                return JSON.stringify({
                    error: `LATAM Pulse failed: ${e.message}`
                });
            }
        };
    </script>
</body>
</html>
